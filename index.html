<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Survival Game</title>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    background-color: #0d1117;
    color: #c9d1d9;
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    line-height: 1.6;
  }

  p {
    margin-bottom: 15px;
  }

  button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    background: #161b22;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #21262d;
  }

  b {
    color: #58a6ff;
  }
</style>
<body>
  <div id="story"></div>

  <script src="https://cdn.jsdelivr.net/npm/inkjs@2.3.2/dist/ink.min.js"></script>

  <script>
    fetch("dyatlov.json")
      .then(res => res.json())
      .then(data => {
        const story = new inkjs.Story(data);
        const container = document.getElementById("story");

        function continueStory() {
          while (story.canContinue) {
            const paragraph = document.createElement("p");
            paragraph.innerHTML = story.Continue();
            container.appendChild(paragraph);
          }

          if (story.currentChoices.length > 0) {
            story.currentChoices.forEach(choice => {
              const btn = document.createElement("button");
              btn.textContent = choice.text;
              btn.onclick = () => {
                container.innerHTML = "";
                story.ChooseChoiceIndex(choice.index);
                continueStory();
              };
              container.appendChild(btn);
            });
          }
        }

        continueStory();
      });
  </script>
</body>
</html>
